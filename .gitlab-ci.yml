clang19-ubuntu-2404:
  extends: .ccache
  image: registry.freedesktop.org/mateosss/basalt:ubuntu2404
  stage: build
  when: manual
  script:
    - apt-get update && apt-get install -y clang-19
    - export CC=clang-19 CXX=clang++-19
    - cmake --preset=ci
    - time cmake --build build

clang21-ubuntu-2604: # This tries to be the latest clang/ubuntu LTS combo
  extends: .ccache
  image: registry.freedesktop.org/mateosss/basalt:ubuntu2604
  stage: build
  when: manual
  script:
    - apt-get update && apt-get install -y clang-21
    - export CC=clang-21 CXX=clang++-21
    - cmake --preset=ci
    - time cmake --build build

aarch64-raspberry-bookworm:
  extends: .ccache
  image: registry.freedesktop.org/mateosss/basalt:ubuntu2404
  stage: build
  when: manual
  script:
    - echo BUILD_RASPBERRY_BOOKWORM_JOB_ID=$CI_JOB_ID >> release.env
    - curl -fL -sS -O https://gitlab.freedesktop.org/mateosss/basalt-lfs/-/raw/main/bookworm-arm64-sysroot.tar.xz
    - curl -fL -sS -O https://github.com/tttapa/docker-arm-cross-toolchain/releases/latest/download/x-tools-aarch64-rpi3-linux-gnu-gcc14.tar.xz
    - tar -xf x-tools-aarch64-rpi3-linux-gnu-gcc14.tar.xz
    - tar -xf bookworm-arm64-sysroot.tar.xz
    - git apply --directory thirdparty/Pangolin/ scripts/aarch64-patches/pangolin.patch
    - cmake --preset=rpi4
    - time cmake --build build
    - cd build && cpack
    - mv *.deb ../basalt-monado-raspberry-bookworm-pi4-aarch64.deb
    - cd ..
    - cmake --preset=rpi5
    - time cmake --build build
    - cd build && cpack
    - mv *.deb ../basalt-monado-raspberry-bookworm-pi5-aarch64.deb
  artifacts:
    name: basalt-monado-raspberry-bookworm
    expose_as: "basalt-monado-raspberry-bookworm-aarch64-debs"
    paths:
      - "basalt-monado-raspberry-bookworm-pi4-aarch64.deb"
      - "basalt-monado-raspberry-bookworm-pi5-aarch64.deb"
    reports:
      dotenv: release.env

